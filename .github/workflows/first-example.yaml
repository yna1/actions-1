name: My-first-workflow

on: push

jobs:
    first_job: 
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Welcome message
              run: echo "Welcome to my first workflow"

            - name: list files
              run: ls

            - name: Read file
              run: cat README.md 

            - name: Generte ASCII Artwork
              run: cowsay -f dragon "Run for cover, I am a DRAGON...RAWE" >> dragon.txt